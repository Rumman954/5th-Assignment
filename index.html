<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <link rel="stylesheet" href="tailwind.init.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="theme.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center p-4 sm:p-6 overflow-x-hidden transition-colors">
  <div class="absolute top-4 right-4">
    <button id="themeToggle" type="button" class="p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" title="Toggle theme">
      <i id="themeIcon" class="fas fa-moon"></i>
    </button>
  </div>
  <div class="w-full max-w-md min-w-0">
    <!-- Login Card -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg border border-gray-100 dark:border-gray-700 p-6 sm:p-8">
      <!-- Logo -->
      <div class="flex justify-center mb-4 sm:mb-6">
        <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="GitHub" class="w-14 h-14 sm:w-16 sm:h-16">
      </div>

      <!-- Title -->
      <h1 class="text-xl sm:text-2xl font-bold text-gray-800 dark:text-gray-100 text-center mb-2">GitHub Issues Tracker</h1>
      <p class="text-gray-500 dark:text-gray-400 text-center text-sm mb-8">Sign in to manage your issues.</p>

      <!-- Username -->
      <div class="mb-6">
        <label for="username" class="block text-gray-700 dark:text-gray-300 font-medium mb-2">Username</label>
        <input 
          type="text" 
          id="username" 
          placeholder="Enter Username" 
          class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400"
        >
        <p class="text-purple-600 dark:text-purple-400 text-sm mt-1">Default: admin</p>
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label for="password" class="block text-gray-700 dark:text-gray-300 font-medium mb-2">Password</label>
        <input 
          type="password" 
          id="password" 
          placeholder="Enter Password" 
          class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400"
        >
        <p class="text-purple-600 dark:text-purple-400 text-sm mt-1">Default: admin123</p>
      </div>

      <!-- Sign In Button -->
      <button 
        id="signInBtn" 
        class="w-full py-3 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-lg transition-colors mb-6"
      >
        Sign in
      </button>

      <!-- Separator -->
      <div class="flex items-center gap-4 mb-6">
        <div class="flex-1 h-px bg-gray-200 dark:bg-gray-600"></div>
        <span class="text-gray-400 dark:text-gray-500 text-sm">OR</span>
        <div class="flex-1 h-px bg-gray-200 dark:bg-gray-600"></div>
      </div>

      <!-- Demo Credentials -->
      <p class="text-gray-500 dark:text-gray-400 text-sm text-center mb-3">Demo Credentials</p>
      <div class="bg-gray-100 dark:bg-gray-700 rounded-lg p-4 text-gray-700 dark:text-gray-300 text-sm">
        <p><span class="text-gray-500">Username:</span> <span class="font-medium">admin</span></p>
        <p class="mt-1"><span class="text-gray-500">Password:</span> <span class="font-medium">admin123</span></p>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
