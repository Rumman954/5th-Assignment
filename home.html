<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="tailwind.init.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col sm:flex-row justify-between items-center gap-4 py-4">
        <div class="flex items-center gap-2">
          <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="GitHub" class="w-8 h-8">
          <span class="text-xl font-bold text-gray-800">GitHub Issues Tracker</span>
        </div>
        <div class="flex w-full sm:w-auto gap-2">
          <div class="relative flex-1 sm:w-64">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input 
              type="text" 
              id="searchInput" 
              placeholder="Search Issues..." 
              class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none"
            >
          </div>
          <button class="px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white font-medium rounded-lg transition-colors whitespace-nowrap">
            <i class="fas fa-plus mr-2"></i> New Issue
          </button>
          <button id="logoutBtn" class="px-4 py-2 text-gray-600 hover:text-purple-600 hover:bg-purple-50 rounded-lg transition-colors" title="Logout">
            <i class="fas fa-sign-out-alt"></i>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Tabs -->
    <div class="flex gap-1 mb-6">
      <button id="tabAll" class="tab-btn px-6 py-2.5 rounded-t-lg font-medium bg-purple-600 text-white" data-tab="all">All</button>
      <button id="tabOpen" class="tab-btn px-6 py-2.5 rounded-t-lg font-medium bg-gray-200 text-gray-700 hover:bg-gray-300" data-tab="open">Open</button>
      <button id="tabClosed" class="tab-btn px-6 py-2.5 rounded-t-lg font-medium bg-gray-200 text-gray-700 hover:bg-gray-300" data-tab="closed">Closed</button>
    </div>

    <!-- Summary Section -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center">
            <i class="fas fa-cog text-purple-600 text-xl"></i>
          </div>
          <div>
            <h2 class="text-2xl font-bold text-gray-800"><span id="issueCount">0</span> Issues</h2>
            <p class="text-gray-500 text-sm">Track and manage your project issues.</p>
          </div>
        </div>
        <div class="flex items-center gap-6 text-sm">
          <span class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-green-500"></span>
            <span class="text-gray-600">Open</span>
          </span>
          <span class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-purple-500"></span>
            <span class="text-gray-600">Closed</span>
          </span>
        </div>
      </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="flex flex-col items-center justify-center py-20">
      <div class="w-12 h-12 border-4 border-purple-600 border-t-transparent rounded-full animate-spin"></div>
      <p class="mt-4 text-gray-500">Loading issues...</p>
    </div>

    <!-- Issues Grid -->
    <div id="issuesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 hidden">
      <!-- Issue cards will be inserted here -->
    </div>

    <!-- No Results -->
    <div id="noResults" class="p-12 text-center text-gray-500 hidden">
      <i class="fas fa-inbox text-4xl mb-4 text-gray-300"></i>
      <p>No issues found</p>
    </div>
  </main>

  <script src="home.js"></script>
</body>
</html>
